<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Tree Design</title>
    <style>
        :root {
            --bg-color: #f7f5f2;
            --card-border: #4a332d;
            --trunk-color: #4a332d;
            --btn-gray: #dcdbd9;
            --btn-green: #2e7d32;
            --btn-brown: #795548;
            --btn-red: #c62828;
            --circle-blue: #5b7c89;
            --circle-pink: #a64d79;
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 50px 0;
            display: flex;
            justify-content: center;
        }

        #tree-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        /* The vertical trunk line */
        #tree-container::before {
            content: '';
            position: absolute;
            top: 0;
            bottom: 0;
            width: 4px;
            background-color: var(--trunk-color);
            z-index: 0;
        }

        .card {
            background: white;
            border: 2px solid var(--card-border);
            border-radius: 20px;
            width: 340px;
            padding: 25px;
            margin-bottom: 60px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            position: relative;
            z-index: 1;
            text-align: center;
        }

        .initials-row {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .circle {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 2px solid;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            font-weight: bold;
            color: #333;
        }

        .male { border-color: var(--circle-blue); }
        .female { border-color: var(--circle-pink); }

        .name-text {
            font-size: 20px;
            font-weight: 800;
            color: #1a1a1a;
            margin-bottom: 20px;
        }

        .button-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .btn {
            border: none;
            border-radius: 8px;
            padding: 12px 0;
            font-size: 13px;
            font-weight: 900;
            color: white;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn-edit { background-color: var(--btn-gray); color: #444; }
        .btn-child { background-color: var(--btn-green); }
        .btn-spouse { background-color: var(--btn-brown); }
        .btn-red { background-color: var(--btn-red); }

        /* Hover effect */
        .btn:hover { filter: brightness(90%); }
    </style>
</head>
<body>

<div id="tree-container">
    <div class="card">
        <div class="initials-row">
            <div class="circle male">J</div>
            <div class="circle female">N</div>
        </div>
        <div class="name-text">Jamil Joseph Daaboul & Nazira</div>
        <div class="button-grid">
            <button class="btn btn-edit">EDIT</button>
            <button class="btn btn-child">+CHILD</button>
            <button class="btn btn-spouse">+SPOUSE</button>
            <button class="btn btn-red">DEL</button>
        </div>
    </div>

    <div class="card">
        <div class="initials-row">
            <div class="circle male">J</div>
            <div class="circle female">M</div>
        </div>
        <div class="name-text">Joseph & Marie</div>
        <div class="button-grid">
            <button class="btn btn-edit">EDIT</button>
            <button class="btn btn-child">+CHILD</button>
            <button class="btn btn-spouse">+SPOUSE</button>
            <button class="btn btn-red">DEL</button>
        </div>
    </div>
</div>

</body>
</html>
