<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jamil's Family Tree</title>
    <style>
        :root {
            --paper: #f1ebd9;
            --trunk: #3d2b1f;
            --btn-green: #2e7d32;
            --btn-red: #c62828;
            --btn-brown: #795548;
            --btn-gray: #dcdbd9;
        }

        body {
            background-color: var(--paper);
            background-image: url('https://www.transparenttextures.com/patterns/natural-paper.png');
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Segoe UI', Arial, sans-serif;
            min-height: 150vh;
        }

        h1 { color: var(--trunk); margin-top: 40px; font-size: 2.5rem; }

        /* The canvas where the tree lives */
        #tree-canvas {
            position: relative;
            width: 900px;
            height: 1200px;
            margin-top: 50px;
        }

        /* Drawing the tree with SVG to match your image exactly */
        #tree-graphic {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .card {
            position: absolute; /* Allows exact placement on branches */
            background: white;
            border: 2px solid var(--trunk);
            border-radius: 20px;
            width: 300px;
            padding: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            z-index: 10;
            text-align: center;
        }

        .initials {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 10px;
        }

        .circle {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 2px solid;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
        }

        .male { border-color: #5b7c89; color: #333; }
        .female { border-color: #a64d79; color: #333; }

        .name-label {
            font-weight: 800;
            font-size: 1.1rem;
            margin-bottom: 15px;
            color: #1a1a1a;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .btn {
            border: none;
            border-radius: 6px;
            padding: 10px 0;
            font-size: 11px;
            font-weight: 900;
            color: white;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn-edit { background: var(--btn-gray); color: #444; }
        .btn-child { background: var(--btn-green); }
        .btn-spouse { background: var(--btn-brown); }
        .btn-del { background: var(--btn-red); }

        .btn:hover { filter: brightness(1.1); }
    </style>
</head>
<body>

    <h1>Our Family Tree</h1>

    <div id="tree-canvas">
        <svg id="tree-graphic" viewBox="0 0 900 1200">
            <path d="M450 1200 Q 450 800 450 400" stroke="#3d2b1f" stroke-width="12" fill="none" />
            <path d="M450 800 Q 300 700 150 750" stroke="#3d2b1f" stroke-width="8" fill="none" />
            <path d="M450 800 Q 600 700 750 750" stroke="#3d2b1f" stroke-width="8" fill="none" />
            <path d="M450 500 Q 350 400 250 350" stroke="#3d2b1f" stroke-width="6" fill="none" />
            <path d="M450 500 Q 550 400 650 350" stroke="#3d2b1f" stroke-width="6" fill="none" />
        </svg>

        <div id="card-layer"></div>
    </div>

<script>
    // Data with X and Y coordinates for placement on the branches
    let family = [
        { id: 1, n1: "Jamil Joseph Daaboul", n2: "Nazira", x: 300, y: 50 },
        { id: 2, n1: "Joseph", n2: "Marie", x: 20, y: 650 },
        { id: 3, n1: "Jamil", n2: "Carol", x: 580, y: 650 }
    ];

    function render() {
        const layer = document.getElementById('card-layer');
        layer.innerHTML = '';
        family.forEach(m => {
            const div = document.createElement('div');
            div.className = 'card';
            div.style.left = m.x + 'px';
            div.style.top = m.y + 'px';
            div.innerHTML = `
                <div class="initials">
                    <div class="circle male">${m.n1[0]}</div>
                    <div class="circle female">${m.n2[0] || '?'}</div>
                </div>
                <div class="name-label">${m.n1} & ${m.n2}</div>
                <div class="grid">
                    <button class="btn btn-edit" onclick="edit(${m.id})">Edit</button>
                    <button class="btn btn-child" onclick="add()">+Child</button>
                    <button class="btn btn-spouse" onclick="alert('Add Spouse')">+Spouse</button>
                    <button class="btn btn-del" onclick="del(${m.id})">Del</button>
                </div>
            `;
            layer.appendChild(div);
        });
    }

    window.edit = (id) => {
        const p = family.find(f => f.id === id);
        p.n1 = prompt("Husband:", p.n1) || p.n1;
        p.n2 = prompt("Wife:", p.n2) || p.n2;
        render();
    };

    window.add = () => {
        const name = prompt("Name:");
        if(name) {
            family.push({ id: Date.now(), n1: name, n2: "", x: 300, y: 400 });
            render();
        }
    };

    window.del = (id) => {
        if(confirm("Delete?")) {
            family = family.filter(f => f.id !== id);
            render();
        }
    };

    render();
</script>
</body>
</html>
