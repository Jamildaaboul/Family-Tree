<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>The Daaboul Family Tree Pro</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    :root { --bg: #f8fafc; --card: #ffffff; --text: #1e293b; --line: #cbd5e1; --male-accent: #3b82f6; --female-accent: #ec4899; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg); margin: 0; overflow: hidden; height: 100vh; width: 100vw; touch-action: none; color: var(--text); }
    
    .header { position: fixed; top: 0; left: 0; right: 0; background: #1e293b; color: white; padding: 15px; text-align: center; z-index: 2000; height: 40px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
    .header h1 { margin: 0; font-size: 24px; font-weight: 300; letter-spacing: 1px; }
    
    .toolbar { position: fixed; top: 85px; left: 50%; transform: translateX(-50%); background: white; padding: 12px 25px; border-radius: 50px; box-shadow: 0 8px 30px rgba(0,0,0,0.15); display: flex; gap: 10px; z-index: 1000; border: 2px solid #3b82f6; align-items: center; }
    .search-input { padding: 8px 15px; border-radius: 20px; border: 1px solid #cbd5e1; font-size: 12px; outline: none; width: 120px; }
    .tool-btn { padding: 10px 15px; border-radius: 20px; border: none; cursor: pointer; font-weight: bold; font-size: 11px; text-transform: uppercase; transition: 0.2s; }
    
    .zoom-btn { background: #334155; color: white; width: 45px; font-size: 18px; }
    .home-btn { background: #64748b; color: white; width: 45px; font-size: 18px; }

    #viewport { width: 100%; height: 100%; cursor: grab; display: flex; align-items: center; justify-content: center; }
    #viewport:active { cursor: grabbing; }
    #tree-container { transform-origin: center center; transition: transform 0.1s ease-out; padding-top: 100px; }

    .tree ul { display: flex; justify-content: center; padding: 30px 0 0 0; position: relative; }
    .tree li { text-align: center; list-style-type: none; position: relative; padding: 30px 20px 0 20px; }
    .tree li::before, .tree li::after { content: ''; position: absolute; top: 0; right: 50%; border-top: 4px solid var(--line); width: 50%; height: 30px; }
    .tree li::after { right: auto; left: 50%; border-left: 4px solid var(--line); }
    .tree li:only-child::after, .tree li:only-child::before { display: none; }
    .tree li:only-child { padding-top: 0; }
    .tree ul ul::before { content: ''; position: absolute; top: 0; left: 50%; border-left: 4px solid var(--line); width: 0; height: 30px; }

    .tree-node { background: var(--card); border: 2px solid #e2e8f0; border-radius: 24px; width: 280px; padding: 25px; display: inline-block; box-shadow: 0 10px 30px rgba(0,0,0,0.08); transition: border 0.3s; }
    .tree-node.highlight { border-color: #f59e0b; box-shadow: 0 0 20px rgba(245, 158, 11, 0.4); }
    
    .avatar-pair { display: flex; justify-content: center; gap: 20px; margin-bottom: 15px; position: relative; }
    .marriage-line { position: absolute; top: 40px; left: 50%; transform: translateX(-50%); width: 45px; height: 4px; background: var(--line); z-index: 1; }
    
    .node-avatar { 
      width: 85px; height: 85px; border-radius: 50%; border: 5px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.15); 
      display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 30px; cursor: pointer; 
      /* --- THE FIX: COVER MODE --- */
      background-size: cover;      
      background-position: center; 
      background-repeat: no-repeat;
      position: relative; z-index: 2; overflow: hidden; 
    }
    
    .male { background: var(--male-accent); color: white; }
    .female { background: var(--female-accent); color: white; }
    .name-tag { font-weight: 800; color: #0f172a; font-size: 20px; margin-top: 12px; }
    .dob-tag { font-size: 15px; color: #64748b; font-weight: 600; margin-top: 4px; }

    .node-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 25px; }
    .btn { padding: 12px 5px; border: none; border-radius: 10px; font-size: 11px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
    .edit-btn { background: #f1f5f9; color: #475569; }
    .add-btn { background: #10b981; color: white; }
    .spouse-btn { background: #8b5cf6; color: white; }
    .del-btn { background: #ef4444; color: white; }
  </style>
</head>
<body>
  <div class="header"><h1>The Daaboul Family Tree Pro</h1></div>
  
  <div class="toolbar">
    <input type="text" class="search-input" placeholder="Search names..." oninput="searchTree(this.value)">
    <button class="tool-btn home-btn" onclick="resetView()">🏠</button>
    <button class="tool-btn zoom-btn" onclick="zoom(1.3)">➕</button>
    <button class="tool-btn zoom-btn" onclick="zoom(0.7)">➖</button>
    <button class="tool-btn export-btn" style="background:#3b82f6;color:white" onclick="exportData()">💾 Save</button>
    <button class="tool-btn load-btn" style="background:#64748b;color:white" onclick="document.getElementById('fileInput').click()">📂 Load</button>
    <button class="tool-btn share-btn" style="background:#f59e0b;color:white" onclick="copyLink()">🔗 Link</button>
    <input type="file" id="fileInput" style="display: none" onchange="importData(event)">
    <input type="file" id="photoInput" style="display: none" onchange="handlePhotoUpload(event)" accept="image/*">
  </div>

  <div id="viewport">
    <div id="tree-container" class="tree"></div>
  </div>

  <script>
    let scale = 1, pointX = 0, pointY = 0, start = { x: 0, y: 0 }, isDragging = false;
    const viewport = document.getElementById('viewport'), container = document.getElementById('tree-container');

    function zoom(amount) { scale *= amount; updateTransform(); }
    function resetView() { scale = 1; pointX = 0; pointY = 0; updateTransform(); }

    window.addEventListener('wheel', (e) => { e.preventDefault(); zoom(e.deltaY > 0 ? 0.85 : 1.15); }, { passive: false });
    viewport.onmousedown = (e) => { if(e.target.closest('.btn') || e.target.closest('.node-avatar') || e.target.closest('.search-input')) return; isDragging = true; start = { x: e.clientX - pointX, y: e.clientY - pointY }; };
    window.onmousemove = (e) => { if (!isDragging) return; pointX = e.clientX - start.x; pointY = e.clientY - start.y; updateTransform(); };
    window.onmouseup = () => isDragging = false;
    function updateTransform() { container.style.transform = `translate(${pointX}px, ${pointY}px) scale(${scale})`; }

    function searchTree(query) {
      const nodes = document.querySelectorAll('.tree-node');
      nodes.forEach(node => {
        const name = node.querySelector('.name-tag').innerText.toLowerCase();
        if (query && name.includes(query.toLowerCase())) {
          node.classList.add('highlight');
        } else {
          node.classList.remove('highlight');
        }
      });
    }

    function copyLink() { navigator.clipboard.writeText(window.location.href); alert("Link copied!"); }

    let currentPhotoTarget = { id: null, type: 'primary' };
    function triggerPhoto(id, type) { currentPhotoTarget = { id, type }; document.getElementById('photoInput').click(); }
    
    function handlePhotoUpload(e) {
      const file = e.target.files[0];
      const reader = new FileReader();
      reader.onload = (event) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          const SIZE = 400; // High res
          canvas.width = SIZE; canvas.height = SIZE;
          const ctx = canvas.getContext('2d');
          const ratio = Math.max(SIZE / img.width, SIZE / img.height);
          const x = (SIZE - img.width * ratio) / 2;
          const y = (SIZE - img.height * ratio) / 2;
          ctx.drawImage(img, x, y, img.width * ratio, img.height * ratio);
          const p = familyData.find(x => x.id === currentPhotoTarget.id);
          const photoData = canvas.toDataURL('image/jpeg', 0.85);
          if (currentPhotoTarget.type === 'primary') p.photo = photoData;
          else p.spousePhoto = photoData;
          save();
        };
        img.src = event.target.result;
      };
      reader.readAsDataURL(file);
    }

    let familyData = JSON.parse(localStorage.getItem('daaboul_final_v1')) || [{ id: 1, name: "New Tree", dob: "1900", gender: "male", parentId: null }];
    function save() { localStorage.setItem('daaboul_final_v1', JSON.stringify(familyData)); render(); }
    
    function editPerson(id) { 
      const p = familyData.find(x => x.id === id);
      p.name = prompt("Full Name:", p.name) || p.name;
      p.dob = prompt("Birth Year:", p.dob || "1900");
      p.gender = (prompt("Gender (male/female):", p.gender) || "male").toLowerCase();
      save(); 
    }
    function addChild(pid) { const name = prompt("Child's Name:"); if(name) { familyData.push({ id: Date.now(), name, dob: "2026", gender: "male", parentId: pid }); save(); } }
    function addSpouse(id) { 
      const p = familyData.find(x => x.id === id);
      p.spouseName = prompt("Spouse Name:");
      p.spouseDOB = prompt("Spouse Birth Year:", "1900");
      p.spouseGender = (prompt("Gender:", "female") || "female").toLowerCase();
      save(); 
    }
    function deleteNode(id) {
      if(confirm("Delete this person and their children?")) {
        const del = (tid) => { familyData.filter(x => x.parentId === tid).forEach(c => del(c.id)); familyData = familyData.filter(x => x.id !== tid); };
        del(id); save();
      }
    }
    function exportData() { const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(familyData)], {type:"application/json"})); a.download="daaboul-tree.json"; a.click(); }
    function importData(e) { const r = new FileReader(); r.onload = (ev) => { familyData = JSON.parse(ev.target.result); save(); }; r.readAsText(e.target.files[0]); }

    function render() {
      const build = (pid) => {
        const items = familyData.filter(x => x.parentId === pid);
        if(!items.length) return "";
        let h = "<ul>";
        items.forEach(m => {
          const hasSpouse = !!m.spouseName;
          h += `<li><div class="tree-node"><div class="avatar-pair">
            <div class="node-avatar ${m.gender}" style="${m.photo ? `background-image:url(${m.photo});font-size:0` : ''}" onclick="triggerPhoto(${m.id}, 'primary')">${m.name ? m.name[0] : '?'}</div>
            ${hasSpouse ? `<div class="marriage-line"></div><div class="node-avatar ${m.spouseGender}" style="${m.spousePhoto ? `background-image:url(${m.spousePhoto});font-size:0` : ''}" onclick="triggerPhoto(${m.id}, 'spouse')">${m.spouseName ? m.spouseName[0] : '?'}</div>` : ''}
            </div><div class="name-tag">${m.name} ${hasSpouse ? '& '+m.spouseName : ''}</div>
            <div class="dob-tag">b. ${m.dob} ${hasSpouse ? '& b. ' + m.spouseDOB : ''}</div>
            <div class="node-actions"><button class="btn edit-btn" onclick="editPerson(${m.id})">Edit</button><button class="btn add-btn" onclick="addChild(${m.id})">Child</button><button class="btn spouse-btn" onclick="addSpouse(${m.id})">Spouse</button><button class="btn del-btn" onclick="deleteNode(${m.id})">Del</button></div></div>
            ${build(m.id)}</li>`;
        });
        return h + "</ul>";
      };
      container.innerHTML = build(null);
    }
    render();
  </script>
</body>
</html>
